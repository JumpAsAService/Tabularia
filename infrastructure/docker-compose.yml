services:
  # Valkey: fork open source BSD-3 di Redis, drop-in (stesso protocollo/porta).
  # Il servizio resta chiamato "redis" così REDIS__HOST, il broker Celery e le
  # URL redis:// non cambiano.
  redis:
    image: valkey/valkey:8-alpine
    container_name: dataprep-valkey
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: valkey-server --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Postgres: DB dei metadati del control plane (utenti, gruppi, progetti, permessi).
  # Lo possiede SOLO il gateway; l'engine resta stateless (Valkey + MinIO).
  postgres:
    image: postgres:16-alpine
    container_name: dataprep-postgres
    ports:
      - "5433:5432"  # 5433 host: evita conflitti con un eventuale Postgres locale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB__USER:-tabularia}
      - POSTGRES_PASSWORD=${DB__PASSWORD:-tabularia}
      - POSTGRES_DB=${DB__NAME:-tabularia}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER:-tabularia}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO: object storage S3-compatibile vero (streaming multipart su disco,
  # gestisce file grandi senza bufferizzare in RAM come faceva rclone serve s3).
  # Le credenziali root vengono dalle stesse variabili che usa l'app (una sola
  # fonte di verità in .env).
  minio:
    image: minio/minio:latest
    container_name: dataprep-minio
    ports:
      - "9002:9000"  # API S3 (9002 host: la 9000 è occupata da ClickHouse)
      - "9001:9001"  # console web
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${STORAGE__ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${STORAGE__SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Engine (data plane): NON esposto sull'host. Raggiungibile solo dagli altri
  # servizi sulla rete Docker (il gateway ci fa da proxy). Niente `ports:`.
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dataprep-backend
    # riparte da solo se il container muore (es. OOM-kill del processo principale):
    # niente engine giù, niente run appesi fino allo stale-timeout
    restart: unless-stopped
    expose:
      - "8000"  # solo interno alla rete dataprep-network
    env_file:
      - .env
    volumes:
      - ../backend:/app
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    # Tetto di RAM: un'operazione che esplode (es. cross join) viene uccisa
    # dall'OOM del container invece di freezare l'host. memswap_limit == mem_limit
    # DISABILITA lo swap del container (lo swap-thrashing è ciò che blocca il PC).
    mem_limit: ${BACKEND_MEM_LIMIT:-4g}
    memswap_limit: ${BACKEND_MEM_LIMIT:-4g}
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Gateway (control plane): UNICO ingresso pubblico (:8000). Auth + RBAC + Postgres,
  # poi inoltra all'engine interno.
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: dataprep-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENGINE__BASE_URL=http://backend:8000
      - DB__HOST=postgres
      - DB__PORT=5432
    volumes:
      - ../gateway:/app
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    # rende VISIBILE un gateway wedged: con `uvicorn --reload` un fallimento di
    # avvio (es. DB non risolvibile) lascia il container "running" ma non servente.
    # L'immagine è slim (niente curl/wget) → si usa Python stdlib.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    # NB: niente container_name → così `docker compose up -d --scale worker=N`
    # può avviare più repliche (un nome fisso collide e blocca lo scaling).
    # riparte da solo dopo un OOM-kill del processo principale del worker:
    # il caso limite in cui muore l'intero container invece del solo task-figlio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # glibc apre un'arena malloc per thread: con i molti thread di Polars/Arrow
      # questo gonfia l'RSS residuo (memoria non restituita all'OS). Limitare le
      # arene riduce la frammentazione e appiattisce gli scalini di memoria.
      - MALLOC_ARENA_MAX=2
    volumes:
      - ../backend:/app
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    # Tetto di RAM del worker (dove girano i run): un run che esplode (cross join,
    # aggregazioni giganti) viene ucciso dall'OOM invece di freezare l'host.
    # memswap_limit == mem_limit disabilita lo swap (evita lo swap-thrashing).
    mem_limit: ${WORKER_MEM_LIMIT:-4g}
    memswap_limit: ${WORKER_MEM_LIMIT:-4g}
    # Worker PURO (niente -B): l'orologio è il servizio `beat` dedicato qui sotto,
    # così questo servizio è scalabile a N repliche senza duplicare i task
    # periodici. Niente --concurrency → viene dal conf (CELERY__WORKER_CONCURRENCY,
    # default 2), unica fonte di verità usata anche per il tetto di memoria
    # per-figlio. -Q celery: consuma SOLO la coda di default (i run pesanti); le
    # anteprime vanno sulla coda `preview`, servita dal preview-worker qui sotto.
    command: celery -A app.tasks.celery_app worker -E -Q celery --loglevel=info

  # Beat = UNICO orologio dello stack: schedula i task periodici (eviction step
  # cache, storage-stats) e li mette in coda; a ESEGUIRLI sono i worker. DEVE
  # restare a 1 replica — N beat accodano i task periodici N volte. Non esegue
  # task, quindi è leggero e non tocca lo storage (solo il broker).
  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dataprep-beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --schedule /tmp/celerybeat-schedule --loglevel=info

  # Worker DEDICATO alle anteprime: coda `preview`, interattivo. Separato dal
  # worker dei run così una preview non resta bloccata dietro un run lungo (e
  # viceversa). Niente beat qui. Le anteprime sono più leggere → concurrency più
  # alta possibile, ma con lo stesso tetto di memoria per-figlio derivato dal
  # limite del container (scala automaticamente con mem_limit/concurrency).
  preview-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    # niente container_name → scalabile con --scale preview-worker=N
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MALLOC_ARENA_MAX=2
      - CELERY__WORKER_CONCURRENCY=${PREVIEW_WORKER_CONCURRENCY:-2}
    volumes:
      - ../backend:/app
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    mem_limit: ${PREVIEW_WORKER_MEM_LIMIT:-2g}
    memswap_limit: ${PREVIEW_WORKER_MEM_LIMIT:-2g}
    command: celery -A app.tasks.celery_app worker -E -Q preview --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dataprep-frontend
    ports:
      - "3000:3000"
    environment:
      # il browser chiama il GATEWAY (unico ingresso pubblico), non l'engine
      - NUXT_PUBLIC_API_BASE=http://localhost:8000
      - NUXT_PUBLIC_BUCKET=data-prep
      # Grafana visto dal BROWSER (iframe della tab Monitoring)
      - NUXT_PUBLIC_GRAFANA_URL=http://localhost:3001
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - gateway

  # ── Monitoraggio ────────────────────────────────────────────────────────
  # VictoriaMetrics: TSDB Prometheus-compatibile ma leggero; fa da scraper.
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.103.0
    container_name: dataprep-victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/vmdata
      - ./monitoring/scrape.yml:/etc/vm/scrape.yml:ro
    command:
      - "-storageDataPath=/vmdata"
      - "-promscrape.config=/etc/vm/scrape.yml"
      - "-retentionPeriod=3"  # mesi

  # Grafana: dashboard. Credenziali admin da variabili d'ambiente (cambiabili in prod).
  grafana:
    image: grafana/grafana:11.2.0
    container_name: dataprep-grafana
    ports:
      - "3001:3000"  # 3000 è già del frontend
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # embed nella tab Monitoring dell'app (iframe): senza allow_embedding
      # Grafana manda X-Frame-Options: deny. L'anonimo Viewer serve perché
      # l'iframe non condivide la sessione dell'app: chi raggiunge la :3001
      # vede le dashboard SENZA login (sola lettura). Ok in locale; se esponi
      # lo stack, chiudi la porta o metti un auth-proxy davanti.
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_ANONYMOUS_HIDE_VERSION=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - victoriametrics

  # cAdvisor: metriche per-container (CPU/mem/disco/rete).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: dataprep-cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg

  # node-exporter: metriche dell'host (CPU, memoria, disco/SSD, load).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: dataprep-node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro
    ports:
      - "9100:9100"

  # celery-exporter: task attivi, durate, esiti, profondità coda (via eventi Celery).
  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: dataprep-celery-exporter
    environment:
      - CE_BROKER_URL=redis://redis:6379/0
    ports:
      - "9808:9808"
    depends_on:
      - redis

volumes:
  redis_data:
  minio_data:
  postgres_data:
  vm_data:
  grafana_data:

networks:
  default:
    name: dataprep-network