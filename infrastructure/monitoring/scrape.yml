# Target da cui VictoriaMetrics raccoglie le metriche (formato Prometheus).
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: victoriametrics
    static_configs:
      - targets: ["victoriametrics:8428"]

  - job_name: backend           # FastAPI: request/latenza + metriche cache custom
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: celery            # task Celery: attivi, durate, esiti, coda
    static_configs:
      - targets: ["celery-exporter:9808"]

  - job_name: cadvisor          # per-container: CPU/mem/disco/rete
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node              # host: CPU, memoria, disco/SSD, load
    static_configs:
      - targets: ["node-exporter:9100"]
